services:
  - type: web
    name: redfilm-web
    runtime: node
    plan: starter
    region: frankfurt
    branch: main
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: NEXT_PUBLIC_SITE_NAME
        value: REDFILM
      - key: NEXT_PUBLIC_SITE_HOST
        value: redfilm.win
      - key: NEXT_PUBLIC_SITE_URL
        value: https://redfilm.win
      - key: SITE_URL
        value: https://redfilm.win
      - key: NEXT_PUBLIC_APP_URL
        value: https://redfilm.win
      - key: REDFILM_BASE_URL
        value: https://redfilm.win
      - key: PUBLIC_INDEXING_ENABLED
        value: "true"
      - key: PUBLIC_PLAYBACK_ENABLED
        value: "true"
      - key: EMERGENCY_DEINDEX_MODE
        value: "false"
      - key: NEXT_PUBLIC_YANDEX_METRIKA_ID
        value: "110229115"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: VIBIX_API_KEY
        sync: false
      - key: VIBIX_PUBLISHER_ID
        value: "678353780"
      - key: CRON_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_SEO_MODEL
        value: gpt-4.1-mini
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: TELEGRAM_ADMIN_IDS
        sync: false

  - type: worker
    name: redfilm-catalog-worker
    runtime: node
    plan: starter
    region: frankfurt
    branch: main
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run render:worker
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: VIBIX_API_KEY
        sync: false
      - key: VIBIX_PUBLISHER_ID
        value: "678353780"
      - key: VIBIX_CATALOG_WORKER_ENABLED
        value: "true"
      - key: VIBIX_CATALOG_WORKER_INTERVAL_MS
        value: "30000"
      - key: VIBIX_CATALOG_PAGES_PER_RUN
        value: "5"
      - key: VIBIX_CATALOG_IMPORT_BATCH_SIZE
        value: "50"
      - key: VIBIX_CATALOG_PAGE_DELAY_MS
        value: "7000"
      - key: VIBIX_CATALOG_LINKS_LIMIT
        value: "50"
      - key: VIBIX_DAILY_MAX_PAGES_PER_TYPE
        value: "25"
      - key: VIBIX_DAILY_STOP_AFTER_NO_NEW_PAGES
        value: "5"
      - key: VIBIX_DAILY_PAGES_PER_RUN
        value: "5"
      - key: VIBIX_DAILY_PAGE_DELAY_MS
        value: "7000"
      - key: VIBIX_AVAILABLE_MAX_PAGES_PER_TYPE
        value: "650"
      - key: VIBIX_AVAILABLE_INDEX_HARD_CAP
        value: "35000"
      - key: VIBIX_SUSPICIOUS_FULL_CATALOG_TOTAL
        value: "100000"
      - key: VIBIX_CATALOG_429_MIN_COOLDOWN_MS
        value: "300000"
      - key: VIBIX_CATALOG_429_MAX_COOLDOWN_MS
        value: "1800000"
      - key: VIBIX_CATALOG_SOFT_PAGES_PER_RUN
        value: "5"
      - key: VIBIX_CATALOG_SOFT_PAGE_DELAY_MS
        value: "7000"
      - key: SIMILARITY_WORKER_ENABLED
        value: "true"
      - key: SIMILARITY_RECALCULATE_BATCH_SIZE
        value: "75"
      - key: TREND_SYNC_ENABLED
        value: "true"
      - key: TREND_SYNC_BATCH_SIZE
        value: "30"
      - key: TREND_CHECK_BATCH_SIZE
        value: "30"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_SEO_MODEL
        value: gpt-4.1-mini

  - type: cron
    name: redfilm-daily-catalog-cron
    runtime: node
    plan: starter
    region: frankfurt
    branch: main
    schedule: "0 3 * * *"
    buildCommand: npm install --include=dev
    startCommand: npm run render:cron-daily
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: REDFILM_BASE_URL
        value: https://redfilm.win
      - key: NEXT_PUBLIC_SITE_URL
        value: https://redfilm.win
      - key: CRON_SECRET
        sync: false
